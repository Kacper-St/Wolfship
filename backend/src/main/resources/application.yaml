spring:
  application:
    name: Wolfship

  datasource:
    url: jdbc:postgresql://postgres:5432/wolfship_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  output:
    ansi:
      enabled: always

app:
  minio:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: adminpassword
    bucket-name: wolfship-labels
  nominatim:
    url: https://nominatim.openstreetmap.org
    user-agent: Wolfship/1.0 (wolfshipcontact@gmail.com)

jwt:
  secret: dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGp3dCB0b2tlbiBnZW5lcmF0aW9u
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000